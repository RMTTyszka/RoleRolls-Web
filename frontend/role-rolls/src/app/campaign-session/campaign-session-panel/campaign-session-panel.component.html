<p-panel>
  <ng-template #header>
    <p-toolbar class="w-full">
      <div class="flex w-full justify-between items-center">
        <div class="flex w-3/5 space-x-4">
          <p-select class="flex-1" [(ngModel)]="selectedScene" [options]="scenes" optionLabel="name" (onChange)="selectScene($event.value)"></p-select>
          <div class="p-inputgroup w-auto" *ngIf="isMaster">
            <input type="text" pInputText placeholder="Add Scene" [(ngModel)]="newSceneName" class="border rounded px-2 py-1 flex-1">
            <button pButton type="button" icon="pi pi-plus" class="p-button-primary" (click)="newScene()"></button>
          </div>
        </div>
        <div class="flex space-x-2">
          <button *ngIf="isMaster" pButton label="Invite" icon="pi pi-plus" class="p-button-secondary" (click)="invitePlayer()" #invitationButton></button>
          <button *ngIf="!notInvited || isMaster" pButton label="Create Hero" icon="pi pi-plus" class="p-button-secondary" (click)="createHero()"></button>
        </div>
      </div>
    </p-toolbar>
  </ng-template>
  <div class="session-panel__layout">
    <div class="session-panel__creatures-row">
      <rr-scene-creatures
        [creatureCategory]="creatureTypeEnum.Ally"
        class="session-panel__creatures session-panel__creatures--ally">
      </rr-scene-creatures>

      <rr-scene-creatures
        [creatureCategory]="creatureTypeEnum.Enemy"
        class="session-panel__creatures session-panel__creatures--enemy">
      </rr-scene-creatures>
    </div>

    <div class="session-panel__content-row">
      <rr-scene-board
        class="session-panel__board"
        [campaignId]="campaignId"
        [scene]="selectedScene"
        [isMaster]="isMaster"
        [readOnly]="notInvited && !isMaster">
      </rr-scene-board>

      <rr-scene-log class="session-panel__log"></rr-scene-log>
    </div>
  </div>
</p-panel>
