<p-panel styleClass="scene-log-panel">
  <div *ngFor="let history of histories" class="scene-log__entry">
    <div class="scene-log__meta">
      <span class="scene-log__timestamp">{{history.asOfDate | date: 'dd-MM-yy HH:mm'}}</span>
      <span class="scene-log__actor">{{history.actor}}</span>
    </div>

    <p-card styleClass="scene-log__card">
      <div class="scene-log__details">
        <rr-log-details [history]="history"></rr-log-details>
      </div>
    </p-card>
  </div>
</p-panel>
